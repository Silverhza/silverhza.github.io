site_name: Flower Research Notes
site_description: 科研论文总结、知识点卡片与专题梳理
site_url: https://silverhza.github.io
repo_name: Silverhza/silverhza.github.io
repo_url: https://github.com/Silverhza/silverhza.github.io
edit_uri: edit/main/content/
docs_dir: content
site_dir: docs

theme:
  name: material
  language: zh
  logo: null
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: white
      accent: blue grey
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - scheme: slate
      primary: black
      accent: blue grey
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 论文总结:
      - papers/index.md
      - PACT：以性能关键性为核心的分层内存设计: papers/pact-tiered-memory-criticality.md
      - Space-Control：CXL 共享解耦内存中的进程级隔离: papers/space-control-cxl-isolation.md
      - AIORE：CXL Memory 安全支持: papers/aiore-cxl-security/index.md
  - 知识点卡片:
      - notes/index.md
      - gem5手册: notes/gem5/index.md
  - 专题:
      - topics/index.md
  - 内容规范: content-conventions.md
  - 关于: about.md
